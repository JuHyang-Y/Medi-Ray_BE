<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diagnosis - Medi-Ray</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/assets/css/styles.css" />
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
</head>
<body class="bg-white">
	<!-- Header -->
	<header
		class="bg-white w-full h-16 shadow-md fixed flex items-center px-4 z-50">
		<!-- 로고 이미지 -->
		<img src="assets/img/logo.svg" alt="Medi-Ray Logo"
			class="w-32 h-auto cursor-pointer" id="logo" />

		<!-- 햄버거 버튼 -->
		<button id="menuToggle" class="ml-auto text-gray-800">
			<i class="fas fa-bars text-2xl"></i>
		</button>
	</header>

	<!-- Accordion Menu (Right Sidebar) -->
	<div id="accordionMenu"
		class="bg-black text-white p-6 transform translate-x-full fixed top-0 right-0 h-full w-64 transition-transform duration-300 z-50">
		<!-- Close Button -->
		<button id="closeBtn" class="text-white mb-4 focus:outline-none">
			<i class="fas fa-times text-xl"></i> Close
		</button>

		<!-- User Info with Profile Image -->
		<div class="flex items-center mb-6">
			<img src="assets/img/profile.png" alt="Profile Image"
				class="w-12 h-12 rounded-full mr-4" />
			<div id="user-info" class="text-gray-300">
				<!-- 로그인 정보가 동적으로 추가됩니다 -->
			</div>
		</div>

		<!-- Accordion Links -->
		<a href="about" class="py-2 block hover:bg-gray-700 rounded">About
			Us</a> <a href="dicom" class="py-2 block hover:bg-gray-700 rounded">DICOM
			Upload</a> <a href="diagnosis"
			class="py-2 block hover:bg-gray-700 rounded">Diagnosis</a>
	</div>

	<!-- Main Content (중앙 정렬) -->
	<div class="p-8 flex flex-col justify-center items-center min-h-screen">
		<h1 class="text-3xl font-bold mb-4">Diagnosis</h1>

		<!-- 환자 이름 입력 및 검색 -->
		<div class="mb-6 flex items-center space-x-4">
			<label for="inputValue" class="text-lg">환자 정보 입력:</label> <input
				type="text" id="inputValue"
				class="border border-gray-400 p-2 rounded-lg"
				placeholder="이름 또는 코드를 입력해주세요" />
			<button id="searchBtn"
				class="bg-gray-500 text-white py-2 px-4 rounded-lg">
				검색</button>
		</div>

		<!-- 환자 정보 테이블 -->
		<table class="table-auto border-collapse w-3/4 mt-4 text-center">
			<thead>
				<tr class="bg-gray-200">
					<th class="border px-4 py-2">환자코드</th>
					<th class="border px-4 py-2">이름</th>
					<th class="border px-4 py-2">생년월일</th>
					<th class="border px-4 py-2">성별</th>
					<th class="border px-4 py-2">담당의사</th>
				</tr>
			</thead>
			<tbody id="patientTableBody">
				<!-- 동적으로 환자 데이터 렌더링 -->
			</tbody>
		</table>
	</div>

	<!-- JavaScript -->
	<script src="/assets/js/diagnosis.js"></script>
	<script src="/assets/js/header.js"></script>
	<script>
    	// 로고 클릭 시 main로 이동
      	document.getElementById('logo').addEventListener('click', function () {
        	window.location.href = 'main';
      });
    </script>
</body>
</html>
