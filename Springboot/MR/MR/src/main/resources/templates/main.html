<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메인 페이지</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
  </head>
  <body class="bg-white">
    <!-- Header -->
    <header
      class="bg-white w-full h-16 shadow-md fixed flex items-center px-4 z-50"
    >
      <!-- 로고 이미지 -->
      <img
        src="./assets/img/logo.svg"
        alt="Medi-Ray Logo"
        class="w-32 h-auto cursor-pointer"
        id="logo"
      />

      <!-- 햄버거 버튼 -->
      <button id="menuToggle" class="ml-auto text-gray-800">
        <i class="fas fa-bars text-2xl"></i>
      </button>
    </header>

    <!-- Accordion Menu (Right Sidebar) -->
    <div
      id="accordionMenu"
      class="bg-black text-white p-6 transform translate-x-full fixed top-0 right-0 h-full w-64 transition-transform duration-300 z-50"
    >
      <!-- Close Button -->
      <button id="closeBtn" class="text-white mb-4 focus:outline-none">
        <i class="fas fa-times text-xl"></i> Close
      </button>

      <!-- User Info with Profile Image -->
      <div class="flex items-center mb-6">
        <img
          src="assets/img/profile.png"
          alt="Profile Image"
          class="w-12 h-12 rounded-full mr-4"
        />
        <div id="user-info" class="text-gray-300">
          <!-- 로그인 정보가 동적으로 추가됩니다 -->
        </div>
      </div>

      <!-- Accordion Links -->
      <a href="about" class="py-2 block hover:bg-gray-700 rounded"
        >About Us</a
      >
      <a href="dicom" class="py-2 block hover:bg-gray-700 rounded"
        >DICOM Upload</a
      >
      <a href="diagnosis" class="py-2 block hover:bg-gray-700 rounded"
        >Diagnosis</a
      >
    </div>

    <!-- Main Content -->
    <div class="flex justify-center items-center h-screen px-4">
      <div class="flex justify-center items-center max-w-5xl w-full gap-8">
      	<!-- Right side - User Info -->
        <div class="flex-shrink-0">
          <div id="user-info" class="text-gray-300">
            <!-- 로그인된 사용자 이름 표시 -->
          </div>
        </div>
        <!-- Left side - Text Content -->
        <div class="flex flex-col">
          <h1 class="text-4xl font-bold">
            더 빠르고, 더 정확하게<br />
            최신의 진단을 돕는<br />
            <span class="text-5xl mt-3 block">MEDI-RAY</span>
          </h1>
          <div class="flex items-center mt-4">
            <i class="fas fa-info-circle text-gray-500 mr-2"></i>
            <p class="text-xl text-gray-600">
              오른쪽 메뉴 버튼을 클릭하셔서 서비스를 이용하세요
            </p>
          </div>
        </div>

        <!-- Right side - Image -->
        <div class="flex-shrink-0">
          <img
            src="./assets/img/Dricon.png"
            alt="Doctor Illustration"
            class="w-80 h-auto"
          />
        </div>
      </div>
    </div>

    <!-- JavaScript for handling login/logout and menu toggle -->
    <script src="assets/js/header.js"></script>
    <script>
    // 로고 클릭 시 index.html로 이동
      document.getElementById('logo').addEventListener('click', function () {
        window.location.href = 'main';
      });
    </script>
  </body>
</html>
