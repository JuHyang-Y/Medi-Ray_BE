<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body class="bg-gray-100 font-sans" style="font-family: 'Pretendard-Regular'">
    <!-- Header -->
    <header class="bg-white w-full h-16 shadow-md fixed flex items-center px-4">
      <!-- 로고 이미지 -->
      <img
        src="/assets/img/logo.svg"
        alt="Medi-Ray Logo"
        class="w-32 h-auto cursor-pointer"
        id="logo"
      />
    </header>

    <!-- Main Content -->
    <div class="flex justify-center items-center h-screen">
      <div class="max-w-screen-lg w-full bg-white p-8 shadow-md rounded-lg overflow-y-auto" style="max-height: calc(100vh - 4rem);">
        <h2 class="text-xl font-bold text-center mb-6">Sign Up</h2>

        <form id="signupForm">
          <!-- 그리드 레이아웃: 7개의 열을 생성 -->
          <div class="grid grid-cols-7 gap-2">
            <!-- 왼쪽 열 (이름, 전화번호, 이메일, 비밀번호) -->
            <div class="col-span-3">
              <div class="mb-3">
                <label for="name" class="block text-gray-700 text-sm">이름</label>
                <input
                  type="text"
                  id="name"
                  class="w-full p-2 border border-gray-300 rounded"
                  placeholder="이름을 입력해주세요"
                />
              </div>

              <div class="mb-3">
                <label for="phone" class="block text-gray-700 text-sm">전화번호</label>
                <input
                  type="text"
                  id="phone"
                  class="w-full p-2 border border-gray-300 rounded"
                  placeholder="전화번호를 입력해주세요"
                />
                <button
                  type="button"
                  id="verifyPhoneBtn"
                  class="mt-2 w-full p-2 bg-gray-500 text-white rounded"
                >
                  인증
                </button>
              </div>

              <div class="mb-3">
                <label for="email" class="block text-gray-700 text-sm">이메일</label>
                <input
                  type="email"
                  id="email"
                  class="w-full p-2 border border-gray-300 rounded"
                  placeholder="아이디로 사용할 이메일을 입력해주세요"
                />
                <button
                  type="button"
                  id="checkEmailBtn"
                  class="mt-2 w-full p-2 bg-gray-500 text-white rounded"
                >
                  중복확인
                </button>
              </div>

              <div class="mb-3">
                <label for="password" class="block text-gray-700 text-sm">비밀번호</label>
                <input
                  type="password"
                  id="password"
                  class="w-full p-2 border border-gray-300 rounded"
                  placeholder="영문, 숫자, 특수문자가 들어간 8-20자"
                />
                <span id="password-message" class="text-red-500 text-xs"></span>
              </div>

              <div class="mb-3">
                <label for="password-confirm" class="block text-gray-700 text-sm">비밀번호 확인</label>
                <input
                  type="password"
                  id="password-confirm"
                  class="w-full p-2 border border-gray-300 rounded"
                  placeholder="비밀번호를 한 번 더 입력해주세요"
                />
                <span id="confirm-password-message" class="text-xs"></span> <!-- 색상 변경을 위한 id 유지 -->
              </div>
            </div>

            <!-- 가운데 라인 -->
            <div class="col-span-1 flex justify-center items-start px-2">
              <div class="w-px bg-gray-300 h-full"></div>
            </div>

            <!-- 오른쪽 열 (의사코드, 의사소속) -->
            <div class="col-span-3">
              <div class="mb-3">
                <label for="doctor-code" class="block text-gray-700 text-sm">의사코드</label>
                <input
                  type="text"
                  id="doctor-code"
                  class="w-full p-2 border border-gray-300 rounded"
                  placeholder="의사코드를 입력해주세요"
                />
                <button
                  type="button"
                  id="checkDoctorCodeBtn"
                  class="mt-2 w-full p-2 bg-gray-500 text-white rounded"
                >
                  중복확인
                </button>
              </div>

              <div class="mb-3">
                <label for="hospital" class="block text-gray-700 text-sm">의사소속</label>
                <input
                  type="text"
                  id="hospital"
                  class="w-full p-2 border border-gray-300 rounded"
                  placeholder="본인의 소속을 입력해주세요"
                />
              </div>
            </div>
          </div>

          <!-- 완료 및 취소 버튼 (하단 중앙) -->
          <div class="mt-6 flex justify-center space-x-4">
            <button
              type="submit"
              class="w-full max-w-xs bg-blue-500 text-white p-2 rounded"
            >
              완료
            </button>
            <button
              type="button"
              class="w-full max-w-xs bg-gray-500 text-white p-2 rounded"
              id="cancelBtn"
            >
              취소
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- JavaScript for handling button clicks -->
    <script src="/assets/js/signup.js"></script>
    <script>
      // 로고 클릭 시 index.html로 이동
      document.getElementById('logo').addEventListener('click', function () {
        window.location.href = 'index';
      });

      // 취소 버튼 클릭 시 이전 페이지로 이동
      document
        .getElementById('cancelBtn')
        .addEventListener('click', function () {
          window.history.back();
        });
    </script>
  </body>
</html>
